# Rate-limit key: real client IP via Cloudflare, falling back to the peer address.
map $http_cf_connecting_ip $lutea_client {
    default $http_cf_connecting_ip;
    ""      $binary_remote_addr;
}
limit_req_zone  $lutea_client zone=lutea_api:10m rate=30r/m;
limit_conn_zone $lutea_client zone=lutea_conn:10m;
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-store" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://overpass-api.de https://overpass.kumi.systems; base-uri 'self'; frame-ancestors 'none'" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        limit_req  zone=lutea_api burst=10 nodelay;
        limit_conn lutea_conn 8;
        limit_except GET POST { deny all; }
        proxy_pass http://lutea-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 2m;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
