<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=IBM+Plex+Sans+Condensed:wght@500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{background:#08090d;position:relative;font-family:'IBM Plex Sans Condensed',sans-serif}
#glow{position:absolute;inset:0;background:radial-gradient(80% 90% at 78% 30%,rgba(224,86,108,.16),transparent 60%),radial-gradient(60% 70% at 15% 85%,rgba(139,106,208,.12),transparent 60%)}
canvas{position:absolute;inset:0}
#vig{position:absolute;inset:0;background:radial-gradient(120% 100% at 50% 40%,transparent 45%,rgba(4,4,8,.7) 100%)}
.content{position:absolute;left:84px;bottom:74px;z-index:5}
.kick{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.kick .ln{width:40px;height:1px;background:rgba(255,255,255,.35)}
.kick span{font-size:17px;letter-spacing:.3em;text-transform:uppercase;color:#a89fbd}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:150px;line-height:.9;color:#f3eef9;letter-spacing:.02em}
h1 em{font-style:italic;color:#f2879a}
.tag{margin-top:26px;font-size:25px;color:#d0c9de;font-weight:500;letter-spacing:.02em}
.tag b{color:#fff}
.chips{margin-top:24px;display:flex;gap:12px}
.chip{font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:#d0c9de;border:1px solid rgba(255,255,255,.22);padding:9px 18px}
.chip b{color:#f2879a}
.brand{position:absolute;top:56px;left:84px;display:flex;align-items:center;gap:14px;z-index:5}
.brand .dot{width:14px;height:14px;border-radius:50%;background:#e0566c;box-shadow:0 0 22px 4px rgba(224,86,108,.5)}
.brand span{font-family:'Cormorant Garamond',serif;font-size:34px;letter-spacing:.16em;color:#f3eef9}
</style></head>
<body>
<div id="glow"></div>
<canvas id="c" width="1200" height="630"></canvas>
<div id="vig"></div>
<div class="brand"><span class="dot"></span><span>Lutea</span></div>
<div class="content">
  <div class="kick"><span class="ln"></span><span>Women's hormonal health · wearable-native</span></div>
  <h1>Your body keeps<br>a <em>rhythm.</em></h1>
  <div class="tag">We read it, from the <b>Fitbit</b>, <b>Oura</b> or <b>Garmin</b> you already wear.</div>
  <div class="chips"><span class="chip"><b>✓</b> cycle detection</span><span class="chip"><b>✓</b> ovulation signature</span><span class="chip"><b>✓</b> vs. clinical norms</span></div>
</div>
<script>
const ctx=document.getElementById('c').getContext('2d');
const R=[224,86,108], P=[139,106,208];
for(let row=0;row<26;row++){
  const t=row/25, y0=90+row*19;
  for(let x=0;x<1200;x+=13){
    const y=y0+Math.sin(x*0.008+row*0.55)*26+Math.cos(x*0.003-row*0.3)*14;
    const cr=Math.round(R[0]+(P[0]-R[0])*t), cg=Math.round(R[1]+(P[1]-R[1])*t), cb=Math.round(R[2]+(P[2]-R[2])*t);
    const fadeX=Math.min(1,x/260)*Math.min(1,(1200-x)/160);
    const a=(0.05+0.30*Math.pow(1-Math.abs(t-0.25)/0.9,2))*fadeX;
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${a.toFixed(3)})`;
    ctx.beginPath();ctx.arc(x,y,1.6,0,7);ctx.fill();
  }
}
</script>
</body></html>
